services:
  app:
    build: .
    ports:
      - "8010:8000"
      - "5678:5678"
    volumes:
      - .:/code
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always
    depends_on:
      - ollama
      - ollama-webui
    networks:
      - dokploy-network

  ollama:
    image: docker.io/ollama/ollama:latest
    ports:
      - "7869:11434"
    volumes:
      # Utilisation d'un volume managé pour éviter les conflits de permissions hôte/invité
      - ollama_data:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.services.ollama-backend.loadbalancer.server.port=11434"
  ollama-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ollama-webui
    volumes:
      - ./ollama/ollama-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - "8090:3000"
    environment:
      # Optimisation réseau : On cible directement le conteneur 'ollama' sur son port interne
      - OLLAMA_BASE_URLS=http://ollama:11434
      - ENV=dev
      - WEBUI_AUTH=False
      - WEBUI_NAME=valiantlynx AI
      - WEBUI_URL=http://localhost:8080
      - WEBUI_SECRET_KEY=t0p-s3cr3t
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.services.ollama-webui.loadbalancer.server.port=8080"
networks:
  dokploy-network:
    external: true

# Déclaration du volume managé au niveau global
volumes:
  ollama_data:
